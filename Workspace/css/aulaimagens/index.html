<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com imagens</title>
    <style>
        img{
            width: 500px;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com imagens</h1>
    <h2>Imagem bitmap</h2>
    <img src="imagens/logo-sem-fundo.png" alt="imagem da logo sem fundo em formato png">
    <h2>Imagem vetorial</h2>
    <img src="imagens/logo-sem-fundo.svg" alt="imagem da logo sem fundo em formato svg">
    <h2>Imagem bitmap de um gif animado</h2>
    <img src="imagens/gif-animado.gif" alt="imagem com gif animado do homer correndo">
</body>
</html>
